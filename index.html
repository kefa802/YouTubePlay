<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私だけのYouTubeプレイヤー</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #ff0000; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; margin: 10px; }
        button:hover { background-color: #1557b0; }
        .hidden { display: none; }
        input[type="text"] { width: 60%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        #player-container { margin-top: 20px; }
        .user-info { font-size: 14px; color: #555; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Custom YouTube Player</h1>

    <div id="login-section">
        <p>このアプリを使用するにはログインが必要です。</p>
        <button id="btn-login">Googleアカウントでログイン</button>
    </div>

    <div id="app-section" class="hidden">
        <div class="user-info">
            ようこそ、<span id="user-name"></span> さん！
            <button id="btn-logout" style="background-color: #555; padding: 5px 10px; font-size: 12px;">ログアウト</button>
        </div>

        <div>
            <input type="text" id="playlist-id" placeholder="YouTubeプレイリストIDを入力">
            <button id="btn-load">読み込み</button>
        </div>

        <div id="player-container">
            <div id="player"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // ⚠️【重要】ご自身のFirebaseプロジェクトの設定に書き換えてください
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebaseの初期化
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // UI要素の取得
    const loginSection = document.getElementById('login-section');
    const appSection = document.getElementById('app-section');
    const btnLogin = document.getElementById('btn-login');
    const btnLogout = document.getElementById('btn-logout');
    const userName = document.getElementById('user-name');
    const playlistInput = document.getElementById('playlist-id');
    const btnLoad = document.getElementById('btn-load');

    // ログイン処理
    btnLogin.addEventListener('click', () => {
        signInWithPopup(auth, provider).catch((error) => {
            alert("ログインに失敗しました: " + error.message);
        });
    });

    // ログアウト処理
    btnLogout.addEventListener('click', () => {
        signOut(auth);
    });

    // ログイン状態の監視
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // ログイン中
            loginSection.classList.add('hidden');
            appSection.classList.remove('hidden');
            userName.textContent = user.displayName;
        } else {
            // ログアウト中
            loginSection.classList.remove('hidden');
            appSection.classList.add('hidden');
            if (player) player.destroy(); // プレイヤーを消去
        }
    });

    // YouTube IFrame APIの制御
    let player;
    
    // グローバル関数として定義してYouTube APIから呼べるようにする
    window.loadPlaylist = function() {
        const playlistId = playlistInput.value.trim();
        if (!playlistId) {
            alert("プレイリストIDを入力してください");
            return;
        }

        // すでにプレイヤーがある場合は一度破棄
        if (player) {
            player.destroy();
        }

        // 新しいプレイヤーを作成
        player = new YT.Player('player', {
            height: '360',
            width: '100%',
            playerVars: {
                'listType': 'playlist',
                'list': playlistId
            }
        });
    }

    btnLoad.addEventListener('click', window.loadPlaylist);
</script>

<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
